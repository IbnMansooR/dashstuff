<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline';" />
    <title>WorkTrack</title>
    <style>
      :root {
        --bg: #0f172a; --panel: #1e293b; --text: #e2e8f0; --muted: #94a3b8;
        --accent: #3b82f6; --green: #22c55e; --red: #ef4444; --border: #334155;
      }
      * { box-sizing: border-box; }
      body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); }
      .wrap { padding: 22px; }
      h1 { margin: 0 0 2px; font-size: 22px; }
      .muted { color: var(--muted); font-size: 13px; }
      label { display: block; font-size: 12px; color: var(--muted); margin: 12px 0 4px; }
      input {
        width: 100%; background: #273449; border: 1px solid var(--border); color: var(--text);
        padding: 10px 12px; border-radius: 8px; font-size: 14px;
      }
      button {
        width: 100%; margin-top: 14px; background: var(--accent); color: #fff; border: none;
        padding: 11px; border-radius: 8px; font-size: 15px; cursor: pointer;
      }
      button:hover { filter: brightness(1.1); }
      button.stop { background: var(--red); }
      button.ghost { background: transparent; color: var(--accent); border: 1px solid var(--border); }
      .hidden { display: none; }
      .error { color: var(--red); font-size: 13px; margin-top: 8px; }
      .status { margin-top: 16px; padding: 12px; background: var(--panel); border-radius: 8px; font-size: 14px; }
      .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
      .dot.on { background: var(--green); }
      .dot.off { background: var(--muted); }
      .banner {
        background: #422006; color: #fdba74; border: 1px solid #b45309;
        padding: 10px 12px; border-radius: 8px; font-size: 13px; margin-top: 16px; line-height: 1.4;
      }
      .small { font-size: 12px; }
      details summary { cursor: pointer; color: var(--muted); font-size: 12px; margin-top: 14px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>WorkTrack</h1>
      <div class="muted">Hodim ish vaqti agenti</div>

      <!-- LOGIN -->
      <div id="login-view">
        <label>Email</label>
        <input id="email" type="email" placeholder="siz@kompaniya.uz" />
        <label>Parol</label>
        <input id="password" type="password" placeholder="••••••••" />
        <div id="login-error" class="error hidden"></div>
        <button id="login-btn">Kirish</button>
        <details>
          <summary>Server manzili</summary>
          <input id="server-url" placeholder="http://localhost:4000" />
          <button class="ghost" id="save-server">Saqlash</button>
        </details>
      </div>

      <!-- TRACKING -->
      <div id="track-view" class="hidden">
        <div class="status">
          <div><span id="state-dot" class="dot off"></span><span id="state-text">To'xtatilgan</span></div>
          <div class="muted small" id="user-line"></div>
          <div class="muted small" id="last-report"></div>
        </div>

        <button id="start-btn">Ishni boshlash</button>
        <button id="stop-btn" class="stop hidden">Ishni to'xtatish</button>

        <div class="banner">
          ⚠️ Ish rejimi yoqilganda ekraningizdan har <span id="interval-min"></span> daqiqada
          rasmga olinadi va faollik darajangiz ish beruvchiga yuboriladi. Klaviaturada yozgan
          matningiz <b>saqlanmaydi</b> — faqat faol/nofaol holatingiz hisoblanadi.
        </div>

        <button class="ghost" id="logout-btn">Hisobdan chiqish</button>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
